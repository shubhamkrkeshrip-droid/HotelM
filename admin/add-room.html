<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Room - Admin</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/responsive.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<header>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <a href="dashboard.html">
                    <i class="fas fa-hotel"></i>
                    <span>Grand Hotel Admin</span>
                </a>
            </div>
            <div class="nav-buttons">
                <button onclick="logout()" class="btn btn-outline">Logout</button>
            </div>
        </div>
    </nav>
</header>

<div class="dashboard-container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h3>Admin Panel</h3>
        </div>

        <nav class="sidebar-nav">
            <ul>
                <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="manage-rooms.html" class="active"><i class="fas fa-bed"></i> Manage Rooms</a></li>
                <li><a href="manage-reservations.html"><i class="fas fa-calendar-check"></i> Manage Reservations</a></li>
                <li><a href="manage-customers.html"><i class="fas fa-users"></i> Manage Customers</a></li>
                <li><a href="manage-staff.html"><i class="fas fa-user-tie"></i> Manage Staff</a></li>
                <li><a href="manage-bills.html"><i class="fas fa-file-invoice-dollar"></i> Manage Bills</a></li>
                <li><a href="manage-complaints.html"><i class="fas fa-comment-dots"></i> Manage Complaints</a></li>
                <li><a href="reports.html"><i class="fas fa-chart-line"></i> Reports</a></li>
            </ul>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
        <div class="form-container">
            <h1>Add New Room</h1>

            <form id="addRoomForm">

                <!-- Row 1 -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="roomNumber">Room Number *</label>
                        <input type="text" id="roomNumber" name="roomNumber" placeholder="e.g., 101" required>
                    </div>

                    <div class="form-group">
                        <label for="roomType">Room Type *</label>
                        <select id="roomType" name="roomType" required>
                            <option value="" disabled selected>Select Type</option>
                            <option value="Standard">Standard</option>
                            <option value="Deluxe">Deluxe</option>
                            <option value="Suite">Suite</option>
                            <option value="Presidential Suite">Presidential Suite</option>
                        </select>
                    </div>
                </div>

                <!-- Row 2 -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="price">Price per Night (₹) *</label>
                        <input type="number" id="price" name="price" min="1" step="0.01" placeholder="Enter price" required>
                    </div>

                    <div class="form-group">
                        <label for="maxOccupancy">Max Occupancy *</label>
                        <input type="number" id="maxOccupancy" name="maxOccupancy" min="1" max="10" required>
                    </div>
                </div>

                <!-- Row 3 -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="bedType">Bed Type</label>
                        <select id="bedType" name="bedType">
                            <option value="Single">Single</option>
                            <option value="Double">Double</option>
                            <option value="Queen">Queen</option>
                            <option value="King">King</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="roomStatus">Status</label>
                        <select id="roomStatus" name="roomStatus">
                            <option value="available">Available</option>
                            <option value="occupied">Occupied</option>
                            <option value="maintenance">Under Maintenance</option>
                        </select>
                    </div>
                </div>

                <!-- Amenities -->
                <div class="form-group">
                    <label>Amenities</label>
                    <div id="amenitiesCheckboxes" class="amenities-grid">
                        <!-- JS will populate -->
                    </div>
                </div>

                <!-- Description -->
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="4" placeholder="Describe the room features..."></textarea>
                </div>

                <!-- Buttons -->
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Add Room</button>
                    <a href="manage-rooms.html" class="btn btn-outline">Cancel</a>
                </div>

            </form>
        </div>
    </div>
</div>

<script src="../js/validation.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/admin.js"></script>

</body>
</html>
