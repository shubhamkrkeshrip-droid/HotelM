<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Grand Hotel</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <a href="index.html" class="logo">
                    <i class="fas fa-hotel"></i>
                    <span>Grand Hotel</span>
                </a>
                <h2>Welcome Back!</h2>
                <p>Login to your account</p>
            </div>
            
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="showLoginTab('customer')">Customer</button>
                <button class="tab-btn" onclick="showLoginTab('admin')">Admin</button>
                <button class="tab-btn" onclick="showLoginTab('staff')">Staff</button>
            </div>

            <form id="customerLoginForm" class="login-form active">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="customerUsername" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="customerPassword" placeholder="Enter password" required>
                </div>
                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login</button>
                <p class="auth-footer">Don't have an account? <a href="customer/register.html">Register here</a></p>
            </form>

            <form id="adminLoginForm" class="login-form">
                <div class="form-group">
                    <label><i class="fas fa-user-shield"></i> Admin Username</label>
                    <input type="text" id="adminUsername" placeholder="Enter admin username" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="adminPassword" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login as Admin</button>
            </form>

            <form id="staffLoginForm" class="login-form">
                <div class="form-group">
                    <label><i class="fas fa-user-tie"></i> Staff ID</label>
                    <input type="text" id="staffId" placeholder="Enter staff ID" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="staffPassword" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login as Staff</button>
            </form>
        </div>
    </div>

    <script src="js/validation.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
