<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Complaints - Grand Hotel</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/customer.css">
    <link rel="stylesheet" href="../css/responsive.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<header>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <a href="dashboard.html">
                    <i class="fas fa-hotel"></i>
                    <span>Grand Hotel</span>
                </a>
            </div>

            <ul class="nav-menu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="search-rooms.html">Book Room</a></li>
                <li><a href="booking-history.html">My Bookings</a></li>
                <li><a href="complaints.html">Register Complaint</a></li>
                <li><a href="track-complaints.html" class="active">Track Complaints</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>

            <div class="nav-buttons">
                <button onclick="logout()" class="btn btn-outline">Logout</button>
            </div>
        </div>
    </nav>
</header>

<div class="dashboard-container">
    <div class="main-content">

        <h1>Track Your Complaints</h1>

        <!-- FILTER -->
        <div class="complaint-filters">
            <label for="complaintFilter">Filter by Status</label>

            <select id="complaintFilter" name="complaintFilter" onchange="filterComplaints()">
                <option value="all">All Complaints</option>
                <option value="open">Open</option>
                <option value="in-progress">In Progress</option>
                <option value="resolved">Resolved</option>
                <option value="closed">Closed</option>
            </select>
        </div>

        <!-- LIST -->
        <div id="complaintsList" class="complaints-list"></div>

    </div>
</div>

<!-- MODAL -->
<div id="complaintModal" class="modal">
    <div class="modal-content">

        <span class="close" onclick="closeComplaintModal()">&times;</span>

        <div id="complaintDetails"></div>

    </div>
</div>

<script src="../js/validation.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/customer.js"></script>

</body>
</html>
