<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmation - Grand Hotel</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/customer.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="confirmation-container">
        <div class="confirmation-box">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1>Booking Confirmed!</h1>
            <p>Your room has been successfully booked.</p>
            
            <div id="bookingDetails" class="booking-details"></div>
            
            <div class="action-buttons">
                <a href="dashboard.html" class="btn btn-primary">Go to Dashboard</a>
                <button onclick="window.print()" class="btn btn-outline"><i class="fas fa-print"></i> Print Confirmation</button>
                <button onclick="downloadInvoice()" class="btn btn-outline"><i class="fas fa-download"></i> Download Invoice</button>
            </div>
            
            <div class="next-steps">
                <h3>Next Steps:</h3>
                <ul>
                    <li><i class="fas fa-envelope"></i> Check your email for confirmation</li>
                    <li><i class="fas fa-calendar"></i> Arrive on time for check-in (2:00 PM)</li>
                    <li><i class="fas fa-id-card"></i> Carry valid ID proof</li>
                    <li><i class="fas fa-phone"></i> Contact us for any assistance</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="../js/validation.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const bookingId = urlParams.get('id');
        const booking = storage.getBookingById(bookingId);
        
        if (booking) {
            document.getElementById('bookingDetails').innerHTML = `
                <p><strong>Booking ID:</strong> ${booking.bookingId}</p>
                <p><strong>Customer Name:</strong> ${booking.customerName}</p>
                <p><strong>Room Type:</strong> ${booking.roomType} (${booking.roomNumber})</p>
                <p><strong>Check-in:</strong> ${formatDate(booking.checkIn)}</p>
                <p><strong>Check-out:</strong> ${formatDate(booking.checkOut)}</p>
                <p><strong>Total Amount Paid:</strong> ${formatCurrency(booking.totalAmount)}</p>
                <p><strong>Payment Status:</strong> <span class="status paid">Paid</span></p>
            `;
        }
        
        function downloadInvoice() {
            showAlert('Invoice downloaded successfully', 'success');
        }
    </script>
</body>
</html>
